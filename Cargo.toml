[package]
name = "skenion-runtime"
version = "0.6.0"
edition = "2024"
description = "Skenion native runtime"
license = "Apache-2.0"

[dependencies]
axum = "0.8"
clap = { version = "4.5.53", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
skenion-contracts = { git = "https://github.com/echovisionlab/skenion-contracts", tag = "skenion-contracts-v0.3.1" }
thiserror = "2.0.17"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "net"] }
tower-http = { version = "0.6", features = ["cors"] }
winit = "0.30.12"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
