name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.37.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  release:
    name: release metadata
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    outputs:
      tag: ${{ steps.request.outputs.tag }}
      tag_ref: ${{ steps.request.outputs.tag_ref }}
      version: ${{ steps.package.outputs.version }}
      contracts_version: ${{ steps.package.outputs.contracts_version }}
      contracts_line: ${{ steps.package.outputs.contracts_line }}
    steps:
      - id: request
        name: Validate release tag input
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::release tag must be vx.y.z; got '${RELEASE_TAG}'."
            exit 1
          fi

          runtime_version="${RELEASE_TAG#v}"
          {
            echo "tag=${RELEASE_TAG}"
            echo "tag_ref=refs/tags/${RELEASE_TAG}"
            echo "runtime_version=${runtime_version}"
          } >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.request.outputs.tag_ref }}
      - id: package
        name: Validate runtime release
        env:
          EXPECTED_VERSION: ${{ steps.request.outputs.runtime_version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import sys
          import tomllib

          SEMVER = re.compile(r"^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$")

          def fail(message):
              print(f"::error::{message}", file=sys.stderr)
              raise SystemExit(1)

          def require_exact_semver(value, label):
              if not SEMVER.fullmatch(value):
                  fail(f"{label} must be exact SemVer-like x.y.z; got '{value}'.")

          with open("Cargo.toml", "rb") as fh:
              manifest = tomllib.load(fh)

          runtime_version = manifest["package"]["version"]
          expected_version = os.environ["EXPECTED_VERSION"]
          require_exact_semver(runtime_version, "skenion-runtime package version")

          if runtime_version != expected_version:
              fail(
                  "release tag version "
                  f"{expected_version} does not match skenion-runtime package version {runtime_version}."
              )

          dep = manifest["dependencies"].get("skenion-contracts")
          if dep is None:
              fail("Cargo.toml must declare the skenion-contracts dependency.")

          if isinstance(dep, str):
              contracts_version = dep.strip()
          elif isinstance(dep, dict):
              contracts_version = str(dep.get("version", "")).strip()
          else:
              fail("skenion-contracts dependency must be a string or table dependency.")

          require_exact_semver(contracts_version, "skenion-contracts dependency version")
          contracts_line = ".".join(contracts_version.split(".")[:2])

          with open("Cargo.lock", "rb") as fh:
              lockfile = tomllib.load(fh)

          locked_runtime_versions = {
              package["version"]
              for package in lockfile.get("package", [])
              if package.get("name") == "skenion-runtime"
          }
          locked_contracts_versions = {
              package["version"]
              for package in lockfile.get("package", [])
              if package.get("name") == "skenion-contracts"
          }

          if locked_runtime_versions != {runtime_version}:
              fail(
                  "Cargo.lock must contain exactly skenion-runtime "
                  f"{runtime_version}; found {sorted(locked_runtime_versions)}."
              )

          if locked_contracts_versions != {contracts_version}:
              fail(
                  "Cargo.lock must contain exactly skenion-contracts "
                  f"{contracts_version}; found {sorted(locked_contracts_versions)}."
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={runtime_version}", file=output)
              print(f"contracts_version={contracts_version}", file=output)
              print(f"contracts_line={contracts_line}", file=output)
          PY
      - name: Summarize runtime release inputs
        run: |
          {
            echo "## Runtime Release"
            echo ""
            echo "- Runtime tag: ${{ steps.request.outputs.tag }}"
            echo "- Runtime version: ${{ steps.package.outputs.version }}"
            echo "- Contracts line: ${{ steps.package.outputs.contracts_line }}"
            echo "- Contracts dependency version: ${{ steps.package.outputs.contracts_version }}"
            echo "- Distribution: DSUB S3 Runtime binary artifacts"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Verify released contracts crate
        run: |
          if ! curl --fail --silent -H "User-Agent: skenion-runtime-publish/0.1" "https://crates.io/api/v1/crates/skenion-contracts/${{ steps.package.outputs.contracts_version }}" >/dev/null; then
            echo "::error::skenion-contracts ${{ steps.package.outputs.contracts_version }} is not published on crates.io."
            exit 1
          fi

  runtime-assets:
    name: runtime asset (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: release
    continue-on-error: ${{ matrix.release_blocking == false }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            release_blocking: true
            tier: release-blocking
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            release_blocking: true
            tier: release-blocking
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            release_blocking: true
            tier: release-blocking
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            release_blocking: true
            tier: release-blocking
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            release_blocking: false
            tier: preview
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            release_blocking: false
            tier: preview
    env:
      TARGET: ${{ matrix.target }}
      VERSION: ${{ needs.release.outputs.version }}
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      RUNTIME_BIN: target/${{ matrix.target }}/release/skenion-runtime${{ contains(matrix.target, 'windows') && '.exe' || '' }}
    steps:
      - name: Require GitHub release mutation token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::GH_TOKEN organization Actions secret is required for GitHub Release mutation."
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag_ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install AWS CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli
          python - <<'PY'
          import os
          import sysconfig

          scripts = sysconfig.get_path("scripts")
          if not scripts:
              raise SystemExit("could not determine Python scripts directory for awscli")
          with open(os.environ["GITHUB_PATH"], "a", encoding="utf-8") as output:
              print(scripts, file=output)
          PY
      - name: Check AWS CLI
        run: aws --version
      - id: existing
        name: Check existing Runtime artifact in DSUB S3
        env:
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.SKENION_RELEASE_S3_ACCESS_KEY_ID }}
          SKENION_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SKENION_RELEASE_S3_SECRET_ACCESS_KEY }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
        run: |
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/check-runtime-asset-s3-existing.sh \
            "${TARGET}" \
            "${VERSION}" \
            "${RELEASE_TAG}"
      - name: Install Linux native dependencies
        if: steps.existing.outputs.exists != 'true' && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - name: Show Rust toolchain
        if: steps.existing.outputs.exists != 'true'
        run: rustup show
      - name: Add Rust target
        if: steps.existing.outputs.exists != 'true'
        run: rustup target add "${TARGET}"
      - uses: Swatinem/rust-cache@v2
        if: steps.existing.outputs.exists != 'true'
        with:
          prefix-key: skenion-runtime-release-assets-${{ matrix.target }}
          cache-all-crates: "true"
          cache-on-failure: "true"
      - name: Build runtime binary
        if: steps.existing.outputs.exists != 'true'
        run: cargo build --release --locked --bin skenion-runtime --all-features --target "${TARGET}"
      - name: Smoke runtime binary
        if: steps.existing.outputs.exists != 'true'
        run: scripts/smoke-runtime-binary.sh "${RUNTIME_BIN}"
      - id: package
        name: Package runtime asset
        if: steps.existing.outputs.exists != 'true'
        run: scripts/package-runtime-asset.sh "${TARGET}" "${VERSION}" dist
      - id: manifest
        name: Generate Runtime artifact manifest
        if: steps.existing.outputs.exists != 'true'
        env:
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
          RELEASE_TIER: ${{ matrix.tier }}
          CONTRACTS_VERSION: ${{ needs.release.outputs.contracts_version }}
          CONTRACTS_LINE: ${{ needs.release.outputs.contracts_line }}
        run: |
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/publish-runtime-asset-s3.sh \
            --dry-run \
            "${TARGET}" \
            "${VERSION}" \
            "${RELEASE_TAG}" \
            "${{ steps.package.outputs.asset_path }}" \
            "${{ steps.package.outputs.checksum_path }}"
      - id: attest
        name: Generate runtime asset provenance
        if: steps.existing.outputs.exists != 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ steps.package.outputs.asset_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.manifest.outputs.manifest_path }}
      - id: publish
        name: Publish Runtime artifact to DSUB S3
        if: steps.existing.outputs.exists != 'true'
        env:
          SKENION_RELEASE_S3_ENDPOINT: ${{ secrets.SKENION_RELEASE_S3_ENDPOINT }}
          SKENION_RELEASE_S3_REGION: ${{ secrets.SKENION_RELEASE_S3_REGION }}
          SKENION_RELEASE_S3_BUCKET: ${{ secrets.SKENION_RELEASE_S3_BUCKET }}
          SKENION_RELEASE_S3_PREFIX: ${{ secrets.SKENION_RELEASE_S3_PREFIX }}
          SKENION_RELEASE_S3_ACCESS_KEY_ID: ${{ secrets.SKENION_RELEASE_S3_ACCESS_KEY_ID }}
          SKENION_RELEASE_S3_SECRET_ACCESS_KEY: ${{ secrets.SKENION_RELEASE_S3_SECRET_ACCESS_KEY }}
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: ${{ secrets.SKENION_RELEASE_S3_FORCE_PATH_STYLE }}
          SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
          RELEASE_TIER: ${{ matrix.tier }}
          CONTRACTS_VERSION: ${{ needs.release.outputs.contracts_version }}
          CONTRACTS_LINE: ${{ needs.release.outputs.contracts_line }}
        run: |
          SOURCE_COMMIT="$(git rev-parse HEAD)" scripts/publish-runtime-asset-s3.sh \
            --skip-public-verification \
            --use-existing-manifest \
            "${TARGET}" \
            "${VERSION}" \
            "${RELEASE_TAG}" \
            "${{ steps.package.outputs.asset_path }}" \
            "${{ steps.package.outputs.checksum_path }}"
      - name: Summarize runtime asset
        if: steps.existing.outputs.exists != 'true'
        run: |
          {
            echo "## Runtime Asset"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- Platform slug: ${{ steps.package.outputs.platform_slug }}"
            echo "- Tier: ${{ matrix.tier }}"
            echo "- Asset: ${{ steps.package.outputs.asset_name }}"
            echo "- Artifact URL: ${{ steps.publish.outputs.asset_url }}"
            echo "- Checksum URL: ${{ steps.publish.outputs.checksum_url }}"
            echo "- Manifest URL: ${{ steps.publish.outputs.manifest_url }}"
            echo "- Provenance: ${{ steps.attest.outputs.attestation-url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Summarize existing runtime asset
        if: steps.existing.outputs.exists == 'true'
        run: |
          {
            echo "## Runtime Asset"
            echo ""
            echo "- Target: ${TARGET}"
            echo "- Platform slug: ${{ steps.existing.outputs.platform_slug }}"
            echo "- Tier: ${{ matrix.tier }}"
            echo "- Status: existing immutable DSUB S3 artifact; build/package/publish skipped"
            echo "- Asset: ${{ steps.existing.outputs.asset_name }}"
            echo "- Artifact URL: ${{ steps.existing.outputs.asset_url }}"
            echo "- Checksum URL: ${{ steps.existing.outputs.checksum_url }}"
            echo "- Manifest URL: ${{ steps.existing.outputs.manifest_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  release-downloads:
    name: update release download links
    runs-on: ubuntu-latest
    needs:
      - release
      - runtime-assets
    if: always() && needs.release.result == 'success' && needs.runtime-assets.result == 'success'
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    env:
      RELEASE_TAG: ${{ needs.release.outputs.tag }}
      VERSION: ${{ needs.release.outputs.version }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      SKENION_RELEASE_PUBLIC_BASE_URL: ${{ secrets.SKENION_RELEASE_PUBLIC_BASE_URL }}
    steps:
      - name: Require GitHub release mutation token
        run: |
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::GH_TOKEN organization Actions secret is required for GitHub Release mutation."
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: main
      - name: Update GitHub Release download links
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          scripts/update-runtime-release-downloads.sh \
            --delete-github-manifest-assets \
            "${RELEASE_TAG}" \
            "${VERSION}"
