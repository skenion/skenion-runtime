name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example skenion-runtime-v0.37.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  crates:
    name: crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name || inputs.tag, 'skenion-runtime-v')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - id: contracts
        run: |
          version="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as fh:
              data = tomllib.load(fh)
          dep = data["dependencies"]["skenion-contracts"]
          if isinstance(dep, str):
              print(dep.strip("^=~ "))
          else:
              print(dep["version"].strip("^=~ "))
          PY
          )"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=skenion-contracts-v${version}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          ref: ${{ steps.contracts.outputs.tag }}
          path: .deps/skenion-contracts
      - run: ln -sfn "${GITHUB_WORKSPACE}/.deps/skenion-contracts" "${GITHUB_WORKSPACE}/../Skenion-contracts"
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-runtime-publish-rust
          cache-all-crates: "true"
          cache-on-failure: "true"
      - id: package
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="skenion-runtime-v${{ steps.package.outputs.version }}"
          actual="${RELEASE_TAG}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "release tag ${actual} does not match crate version ${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if curl --fail --silent "https://crates.io/api/v1/crates/skenion-runtime/${{ steps.package.outputs.version }}" >/dev/null; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: test -n "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo package --locked
      - if: steps.registry.outputs.published != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
