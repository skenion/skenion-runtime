name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          path: .deps/skenion-contracts
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-examples
          path: .deps/skenion-examples
      - name: Align cross-repo dependency branches
        if: github.event_name == 'pull_request'
        run: |
          for dep in .deps/skenion-contracts .deps/skenion-examples; do
            (
              cd "${dep}"
              if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
                git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
                git checkout FETCH_HEAD
              fi
            )
          done
      - run: ln -sfn "${GITHUB_WORKSPACE}/.deps/skenion-contracts" "${GITHUB_WORKSPACE}/../Skenion-contracts"
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-runtime-rust
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov clean --workspace
      - run: cargo llvm-cov --lib --all-features --jobs 1 --ignore-filename-regex '(Skenion-contracts|src/main\.rs|src/audio_backend\.rs|src/clock_source_manager\.rs|src/midi_input\.rs|src/visual\.rs|src/render/native\.rs|src/render/preview_document\.rs|src/serve\.rs|src/loader\.rs|/rustlib/|tests/)' --fail-under-lines 98 --fail-under-functions 98 --fail-uncovered-lines 300 --fail-uncovered-functions 30 --summary-only
        env:
          RUST_TEST_THREADS: "1"
      - run: cargo run -- validate-project --project .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
      - run: cargo run -- plan --project .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json --format json
      - run: cargo run -- run --project .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json --frames 2 --format json
      - run: cargo run -- serve --help
      - run: cargo run -- legacy-preview --help
      - run: cargo run -- preview-plan --help
      - run: cargo run -- preview-document --help
      - run: cargo run -- legacy-audio-plan --help
      - run: cargo run -- legacy-audio-output --help
      - run: cargo run -- clock-midi --help
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 cargo run -- serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health; then
              exit 0
            fi
            sleep 1
          done
          echo "runtime health endpoint did not become ready" >&2
          exit 1
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 cargo run -- serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi

          post_expect_ok() {
            local expected="$1"
            local endpoint="$2"
            local payload="$3"
            local response
            response="$(curl --fail --silent \
              -H "content-type: application/json" \
              --data @"${payload}" \
              "http://127.0.0.1:3761${endpoint}")"
            python3 -c 'import json, sys; expected = sys.argv[1] == "true"; response = json.loads(sys.argv[2]); ok = response.get("ok"); print(json.dumps(response)) if ok != expected else None; sys.exit(0 if ok == expected else 1)' "${expected}" "${response}"
          }

          post_expect_ok false /v0/validate .deps/skenion-examples/compatibility/v0.1/projects/valid/minimal-value.project.json
          post_expect_ok true /v0/validate .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok true /v0/plan .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok true /v0/run .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok false /v0/validate .deps/skenion-examples/compatibility/v0.2/projects/invalid/ambiguous-algebraic-loop.project.json

          (
            cd .deps/skenion-examples
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-session.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-patch.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-history.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-render-clear-color.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-telemetry.sh
            if grep -q '@skenion.uniform speed' compatibility/v0.1/projects/valid/fullscreen-shader-uniform.project.json; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-shader-uniform.sh
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-shader-multi-uniform.sh
            else
              echo "dynamic shader interface fixtures are not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-value-semantics.sh ]] && grep -q '"message":' scripts/smoke-runtime-value-semantics.sh; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-value-semantics.sh
            else
              echo "message-based value semantics smoke script is not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-object-routing-panel.sh ]] && grep -q '"message":' scripts/smoke-runtime-object-routing-panel.sh; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-object-routing-panel.sh
            elif [[ -x scripts/smoke-runtime-control-layer.sh ]]; then
              echo "legacy control-layer smoke script is not compatible with object-owned control routing"
            else
              echo "message-based object routing smoke script is not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-fullscreen-shader.sh ]] && grep -q '@skenion.uniform speed' compatibility/v0.1/projects/valid/fullscreen-shader-uniform.project.json; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-fullscreen-shader.sh
            else
              echo "dynamic fullscreen shader smoke fixtures are not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-dynamic-shader-interface.sh ]]; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-dynamic-shader-interface.sh
            else
              echo "dynamic shader interface smoke script is not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-shader-diagnostics.sh ]]; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-shader-diagnostics.sh
            else
              echo "shader diagnostics smoke script is not available on examples main yet"
            fi
            if [[ -x scripts/smoke-runtime-clock-source-api.sh ]]; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-clock-source-api.sh
            else
              echo "clock source API smoke script is not available on examples main yet"
            fi
          )

          curl --fail --silent \
            -H "content-type: application/json" \
            --data @.deps/skenion-examples/compatibility/v0.2/projects/valid/live-help-graph-fragment.project.json \
            http://127.0.0.1:3761/v0/session/load >/dev/null

          PREVIEW_START="$(curl --fail --silent \
            -H "content-type: application/json" \
            --data '{}' \
            http://127.0.0.1:3761/v0/session/preview/start)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_START}"

          OPERATION_PAYLOAD="$(python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path(".deps/skenion-examples/compatibility/v0.2/runtime-operations/valid/promote-help-selection-to-root.operation.json")
          operation = json.loads(path.read_text())
          operation["request"]["target"]["baseRevision"] = "1"
          print(json.dumps(operation, separators=(",", ":")))
          PY
          )"

          OPERATION_RESPONSE="$(curl --fail --silent \
            -H "content-type: application/json" \
            --data "${OPERATION_PAYLOAD}" \
            http://127.0.0.1:3761/v0/session/operation)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["applied"] is True' "${OPERATION_RESPONSE}"

          PREVIEW_STALE="$(curl --fail --silent http://127.0.0.1:3761/v0/session/preview)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is True' "${PREVIEW_STALE}"

          PREVIEW_RESTART="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/session/preview/restart)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False; assert r["previewSessionRevision"] == r["sessionRevision"]' "${PREVIEW_RESTART}"

          PREVIEW_STOP="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/session/preview/stop)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "stopped"; assert r["stale"] is False' "${PREVIEW_STOP}"
      - run: |
          if cargo run -- validate-project --project .deps/skenion-examples/compatibility/v0.2/projects/invalid/ambiguous-algebraic-loop.project.json; then
            echo "ambiguous algebraic loop fixture unexpectedly passed" >&2
            exit 1
          fi
