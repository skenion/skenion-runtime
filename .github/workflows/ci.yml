name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUNTIME_BIN: target/debug/skenion-runtime

jobs:
  release-workflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check release script syntax
        run: bash -n scripts/*.sh
      - name: Parse workflow YAML
        run: |
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path) }' .github/workflows/*.yml
      - name: Dry-run Runtime DSUB S3 artifact metadata
        env:
          SKENION_RELEASE_S3_ENDPOINT: https://s3.dsub.io
          SKENION_RELEASE_S3_REGION: us-east-1
          SKENION_RELEASE_S3_BUCKET: skenion
          SKENION_RELEASE_S3_PREFIX: releases
          SKENION_RELEASE_S3_FORCE_PATH_STYLE: "true"
          SKENION_RELEASE_PUBLIC_BASE_URL: https://cdn.dsub.io/skenion/releases
          SOURCE_COMMIT: "0000000000000000000000000000000000000000"
          RELEASE_TIER: release-blocking
          CONTRACTS_VERSION: "0.49.0"
          CONTRACTS_LINE: "0.49"
        run: |
          mkdir -p dist
          asset="dist/skenion-runtime-v0.0.0-linux-x64.tar.gz"
          printf 'runtime dry-run artifact\n' >"${asset}"
          (
            cd dist
            sha256sum "$(basename "${asset}")" >"$(basename "${asset}").sha256"
          )
          scripts/publish-runtime-asset-s3.sh \
            --dry-run \
            x86_64-unknown-linux-gnu \
            0.0.0 \
            v0.0.0 \
            "${asset}" \
            "${asset}.sha256"
          python3 -m json.tool "${asset}.manifest.json" >/dev/null
          python3 - "${asset}.manifest.json" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as fh:
              manifest = json.load(fh)

          assert manifest["schema"] == "skenion.runtime.releaseArtifact.v1"
          assert manifest["component"] == "skenion-runtime"
          assert manifest["runtimeVersion"] == "0.0.0"
          assert manifest["releaseTag"] == "v0.0.0"
          assert manifest["target"] == "x86_64-unknown-linux-gnu"
          assert manifest["rustTargetTriple"] == "x86_64-unknown-linux-gnu"
          assert manifest["platformSlug"] == "linux-x64"
          assert manifest["tier"] == "release-blocking"
          assert manifest["sourceCommit"] == "0000000000000000000000000000000000000000"
          assert manifest["contracts"] == {"version": "0.49.0", "line": "0.49"}
          assert manifest["artifact"]["archiveFormat"] == "tar.gz"
          assert manifest["artifact"]["s3"] == {
              "bucket": "skenion",
              "key": "releases/skenion-runtime/v0.0.0/linux-x64/skenion-runtime-v0.0.0-linux-x64.tar.gz",
          }
          assert manifest["checksum"]["publicUrl"].endswith(".sha256")
          assert manifest["manifest"]["publicUrl"].endswith(".manifest.json")
          PY
      - name: Validate mocked Runtime DSUB S3 publisher
        run: scripts/validate-runtime-asset-s3-publisher.sh
      - name: Validate Runtime release download notes
        env:
          SKENION_RELEASE_PUBLIC_BASE_URL: https://cdn.dsub.io/skenion/releases
        run: |
          body="$(mktemp)"
          output="$(mktemp)"
          cat >"${body}" <<'EOF'
          ## [0.0.0](https://github.com/skenion/skenion-runtime/compare/v0.0.0...v0.0.1) (2026-06-25)

          ### Bug Fixes

          * **ci:** example release note
          EOF

          scripts/update-runtime-release-downloads.sh \
            --dry-run \
            --body-file "${body}" \
            --output "${output}" \
            v0.0.0 \
            0.0.0

          grep -q '### Runtime Downloads' "${output}"
          grep -q 'skenion-runtime/v0.0.0/macos-apple-silicon/skenion-runtime-v0.0.0-macos-apple-silicon.tar.gz' "${output}"
          grep -q 'skenion-runtime/v0.0.0/windows-x64/skenion-runtime-v0.0.0-windows-x64.zip.sha256' "${output}"
          if grep -q 'unknown-linux-gnu' "${output}"; then
            echo "::error::Release notes must not surface Rust target triples in public Runtime download links."
            exit 1
          fi
          if grep -Eq 'windows-(x64|arm64)[^[:space:])]*\.tar\.gz' "${output}"; then
            echo "::error::Windows Runtime public archives must use .zip."
            exit 1
          fi
          if grep -q 'manifest.json' "${output}"; then
            echo "::error::Release notes must not surface Runtime manifest JSON links as user-facing downloads."
            exit 1
          fi
      - name: Validate deterministic Runtime asset packaging
        run: scripts/validate-runtime-asset-packaging.sh
      - name: Validate Runtime publish workflow gating
        run: scripts/validate-runtime-publish-workflow.sh

  rust-quality:
    name: Rust quality, coverage, and runtime smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install native Rust dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - name: Show Rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-runtime-rust-quality
          cache-all-crates: "true"
          cache-on-failure: "true"
      - name: Check Rust formatting
        run: cargo fmt --check
      - name: Lint Rust targets
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Install Rust coverage component
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run Rust tests with coverage thresholds
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: cargo llvm-cov --all-targets --all-features --workspace --ignore-filename-regex '(src/main\.rs|src/visual\.rs|src/serve\.rs|src/loader\.rs|/rustlib/|tests/)' --fail-under-lines 97 --fail-under-functions 96 --summary-only
      - name: Run Rust tests without coverage on main push
        if: github.event_name == 'push'
        run: cargo test --all-targets --all-features
      - name: Build runtime smoke binary
        run: cargo build --bin skenion-runtime --all-features
      - name: Smoke runtime CLI
        run: |
          "${RUNTIME_BIN}" validate-project --project fixtures/current-0.1/valid/clear-color-render.project.json
          "${RUNTIME_BIN}" plan --project fixtures/current-0.1/valid/clear-color-render.project.json --format json
          "${RUNTIME_BIN}" run --project fixtures/current-0.1/valid/clear-color-render.project.json --frames 2 --format json
          "${RUNTIME_BIN}" serve --help
          "${RUNTIME_BIN}" preview-plan --help
          "${RUNTIME_BIN}" preview-document --help
          "${RUNTIME_BIN}" clock-midi --help
      - name: Smoke runtime health endpoint
        run: |
          SKENION_PREVIEW_DRY_RUN=1 "${RUNTIME_BIN}" serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health; then
              exit 0
            fi
            sleep 1
          done
          echo "runtime health endpoint did not become ready after ${attempt} attempts" >&2
          exit 1
      - name: Smoke runtime HTTP API
        run: |
          SKENION_PREVIEW_DRY_RUN=1 "${RUNTIME_BIN}" serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID"' EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready after ${attempt} attempts" >&2
            exit 1
          fi

          post_expect_ok() {
            local expected="$1"
            local endpoint="$2"
            local payload="$3"
            local response
            response="$(curl --fail --silent \
              -H "content-type: application/json" \
              --data @"${payload}" \
              "http://127.0.0.1:3761${endpoint}")"
            python3 -c 'import json, sys; expected = sys.argv[1] == "true"; response = json.loads(sys.argv[2]); ok = response.get("ok"); print(json.dumps(response)) if ok != expected else None; sys.exit(0 if ok == expected else 1)' "${expected}" "${response}"
          }

          post_expect_ok true /v0/validate fixtures/current-0.1/valid/minimal-value.project.json
          post_expect_ok true /v0/validate fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok true /v0/plan fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok true /v0/run fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok false /v0/validate fixtures/current-0.1/invalid/incompatible-edge.project.json

          curl --fail --silent \
            -H "content-type: application/json" \
            --data @fixtures/current-0.1/valid/clear-color-render.project.json \
            http://127.0.0.1:3761/v0/sessions/default/load >/dev/null

          PREVIEW_START="$(curl --fail --silent \
            -H "content-type: application/json" \
            --data '{}' \
            http://127.0.0.1:3761/v0/sessions/default/preview/start)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_START}"

          PREVIEW_RESTART="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/sessions/default/preview/restart)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_RESTART}"

          PREVIEW_STOP="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/sessions/default/preview/stop)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "stopped"; assert r["stale"] is False' "${PREVIEW_STOP}"
      - name: Smoke invalid fixture rejection
        run: |
          if "${RUNTIME_BIN}" validate-project --project fixtures/current-0.1/invalid/incompatible-edge.project.json; then
            echo "incompatible edge fixture unexpectedly passed" >&2
            exit 1
          fi
