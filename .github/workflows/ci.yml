name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUNTIME_BIN: target/debug/skenion-runtime

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          path: .deps/skenion-contracts
      - name: Align contracts dependency branch
        if: github.event_name == 'pull_request'
        run: |
          cd .deps/skenion-contracts
          if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
            git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
            git checkout FETCH_HEAD
          fi
      - run: ln -sfn "${GITHUB_WORKSPACE}/.deps/skenion-contracts" "${GITHUB_WORKSPACE}/../Skenion-contracts"
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-runtime-rust
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - name: Build runtime smoke binary
        run: cargo build --bin skenion-runtime --all-features
      - name: Smoke runtime CLI
        run: |
          "${RUNTIME_BIN}" validate-project --project fixtures/current-0.1/valid/clear-color-render.project.json
          "${RUNTIME_BIN}" plan --project fixtures/current-0.1/valid/clear-color-render.project.json --format json
          "${RUNTIME_BIN}" run --project fixtures/current-0.1/valid/clear-color-render.project.json --frames 2 --format json
          "${RUNTIME_BIN}" serve --help
          "${RUNTIME_BIN}" preview-plan --help
          "${RUNTIME_BIN}" preview-document --help
          "${RUNTIME_BIN}" clock-midi --help
      - name: Smoke runtime health endpoint
        run: |
          SKENION_PREVIEW_DRY_RUN=1 "${RUNTIME_BIN}" serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health; then
              exit 0
            fi
            sleep 1
          done
          echo "runtime health endpoint did not become ready" >&2
          exit 1
      - name: Smoke runtime HTTP API
        run: |
          SKENION_PREVIEW_DRY_RUN=1 "${RUNTIME_BIN}" serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi

          post_expect_ok() {
            local expected="$1"
            local endpoint="$2"
            local payload="$3"
            local response
            response="$(curl --fail --silent \
              -H "content-type: application/json" \
              --data @"${payload}" \
              "http://127.0.0.1:3761${endpoint}")"
            python3 -c 'import json, sys; expected = sys.argv[1] == "true"; response = json.loads(sys.argv[2]); ok = response.get("ok"); print(json.dumps(response)) if ok != expected else None; sys.exit(0 if ok == expected else 1)' "${expected}" "${response}"
          }

          post_expect_ok true /v0/validate fixtures/current-0.1/valid/minimal-value.project.json
          post_expect_ok true /v0/validate fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok true /v0/plan fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok true /v0/run fixtures/current-0.1/valid/clear-color-render.project.json
          post_expect_ok false /v0/validate fixtures/current-0.1/invalid/incompatible-edge.project.json

          curl --fail --silent \
            -H "content-type: application/json" \
            --data @fixtures/current-0.1/valid/clear-color-render.project.json \
            http://127.0.0.1:3761/v0/sessions/default/load >/dev/null

          PREVIEW_START="$(curl --fail --silent \
            -H "content-type: application/json" \
            --data '{}' \
            http://127.0.0.1:3761/v0/sessions/default/preview/start)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_START}"

          PREVIEW_RESTART="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/sessions/default/preview/restart)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_RESTART}"

          PREVIEW_STOP="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/sessions/default/preview/stop)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "stopped"; assert r["stale"] is False' "${PREVIEW_STOP}"
      - name: Smoke invalid fixture rejection
        run: |
          if "${RUNTIME_BIN}" validate-project --project fixtures/current-0.1/invalid/incompatible-edge.project.json; then
            echo "incompatible edge fixture unexpectedly passed" >&2
            exit 1
          fi

  coverage:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev pkg-config
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-contracts
          path: .deps/skenion-contracts
      - run: ln -sfn "${GITHUB_WORKSPACE}/.deps/skenion-contracts" "${GITHUB_WORKSPACE}/../Skenion-contracts"
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-runtime-rust-coverage
          cache-all-crates: "true"
          cache-on-failure: "true"
      - run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage quality gate
        run: cargo llvm-cov --all-targets --all-features --workspace --ignore-filename-regex '(src/main\.rs|src/visual\.rs|src/serve\.rs|src/loader\.rs|/rustlib/|tests/)' --fail-under-lines 100 --fail-under-functions 100 --summary-only
