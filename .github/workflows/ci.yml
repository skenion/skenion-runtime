name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-examples
          ref: codex/examples-port-edge-feedback-v014
          path: .deps/skenion-examples
      - run: rustup show
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features
      - run: rustup component add llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --lib --all-features --ignore-filename-regex '(src/main\.rs|src/visual\.rs|src/render/native\.rs|src/render/preview_document\.rs|src/serve\.rs|src/loader\.rs|/rustlib/|tests/)' --fail-under-lines 100 --fail-under-functions 100 --summary-only
      - run: bash scripts/validate-with-runtime.sh ../..
        working-directory: .deps/skenion-examples
      - run: cargo run -- validate-project --graph .deps/skenion-examples/compatibility/v0.1/graphs/valid/minimal-value.graph.json --nodes .deps/skenion-examples/compatibility/v0.1/nodes
      - run: cargo run -- plan --graph .deps/skenion-examples/compatibility/v0.1/graphs/valid/minimal-value.graph.json --nodes .deps/skenion-examples/compatibility/v0.1/nodes --format json
      - run: cargo run -- run --graph .deps/skenion-examples/compatibility/v0.1/graphs/valid/minimal-value.graph.json --nodes .deps/skenion-examples/compatibility/v0.1/nodes --frames 2 --format json
      - run: cargo run -- serve --help
      - run: cargo run -- preview --help
      - run: cargo run -- preview-plan --help
      - run: cargo run -- preview-document --help
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 cargo run -- serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health; then
              exit 0
            fi
            sleep 1
          done
          echo "runtime health endpoint did not become ready" >&2
          exit 1
      - run: |
          SKENION_PREVIEW_DRY_RUN=1 cargo run -- serve --host 127.0.0.1 --port 3761 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          READY=false
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:3761/health >/dev/null; then
              READY=true
              break
            fi
            sleep 1
          done
          if [[ "${READY}" != "true" ]]; then
            echo "runtime health endpoint did not become ready" >&2
            exit 1
          fi

          post_expect_ok() {
            local expected="$1"
            local endpoint="$2"
            local payload="$3"
            local response
            response="$(curl --fail --silent \
              -H "content-type: application/json" \
              --data @"${payload}" \
              "http://127.0.0.1:3761${endpoint}")"
            python3 -c 'import json, sys; expected = sys.argv[1] == "true"; response = json.loads(sys.argv[2]); ok = response.get("ok"); print(json.dumps(response)) if ok != expected else None; sys.exit(0 if ok == expected else 1)' "${expected}" "${response}"
          }

          post_expect_ok true /v0/validate .deps/skenion-examples/compatibility/v0.1/projects/valid/minimal-value.project.json
          post_expect_ok true /v0/plan .deps/skenion-examples/compatibility/v0.1/projects/valid/minimal-value.project.json
          post_expect_ok true /v0/run .deps/skenion-examples/compatibility/v0.1/projects/valid/minimal-value.project.json
          post_expect_ok false /v0/validate .deps/skenion-examples/compatibility/v0.1/projects/invalid/missing-definition.project.json
          post_expect_ok false /v0/validate .deps/skenion-examples/compatibility/v0.1/projects/invalid/incompatible-edge.project.json
          post_expect_ok true /v0/validate .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok true /v0/plan .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok true /v0/run .deps/skenion-examples/compatibility/v0.2/projects/valid/render-output.project.json
          post_expect_ok false /v0/validate .deps/skenion-examples/compatibility/v0.2/projects/invalid/ambiguous-algebraic-loop.project.json

          (
            cd .deps/skenion-examples
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-session.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-patch.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-history.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-render-clear-color.sh
            SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-telemetry.sh
            if [[ -x scripts/smoke-runtime-fullscreen-shader.sh ]]; then
              SKENION_RUNTIME_URL=http://127.0.0.1:3761 bash scripts/smoke-runtime-fullscreen-shader.sh
            else
              echo "fullscreen shader smoke script is not available on examples main yet"
            fi
          )

          curl --fail --silent \
            -H "content-type: application/json" \
            --data @.deps/skenion-examples/compatibility/v0.1/projects/valid/minimal-value.project.json \
            http://127.0.0.1:3761/v0/session/load >/dev/null

          PREVIEW_START="$(curl --fail --silent \
            -H "content-type: application/json" \
            --data '{}' \
            http://127.0.0.1:3761/v0/session/preview/start)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False' "${PREVIEW_START}"

          curl --fail --silent \
            -H "content-type: application/json" \
            --data @.deps/skenion-examples/compatibility/v0.1/patches/valid/set-value-param.patch.json \
            http://127.0.0.1:3761/v0/session/patch >/dev/null

          PREVIEW_STALE="$(curl --fail --silent http://127.0.0.1:3761/v0/session/preview)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is True' "${PREVIEW_STALE}"

          PREVIEW_RESTART="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/session/preview/restart)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "running"; assert r["stale"] is False; assert r["previewSessionRevision"] == r["sessionRevision"]' "${PREVIEW_RESTART}"

          PREVIEW_STOP="$(curl --fail --silent \
            -X POST \
            http://127.0.0.1:3761/v0/session/preview/stop)"
          python3 -c 'import json, sys; r=json.loads(sys.argv[1]); assert r["ok"] is True; assert r["state"] == "stopped"; assert r["stale"] is False' "${PREVIEW_STOP}"
      - run: |
          if cargo run -- validate-project --graph .deps/skenion-examples/compatibility/v0.1/graphs/invalid/missing-definition.graph.json --nodes .deps/skenion-examples/compatibility/v0.1/nodes; then
            echo "missing-definition fixture unexpectedly passed" >&2
            exit 1
          fi
